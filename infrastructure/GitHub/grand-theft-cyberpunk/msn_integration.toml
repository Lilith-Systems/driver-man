## HELL CAMPAIGN — The Nine Circles + Pandemonium
[MSN.HellCampaign]
Enable = true
CampaignPath = "r6/scripts/hell/msn_hell_campaign.reds"
QuestPath = "r6/scripts/quests/hell_circle_quests.reds"
SpaceCombatPath = "r6/scripts/space/msn_hell_space_combat.reds"
LuciferDialoguePath = "r6/scripts/core/msn_lucifer_dialogue.reds"
TweakDBItems = "tweakdb/hell_items.yaml"
TweakDBRedsDir = "tweakdb/reds/"
WorldMap = "tweakdb/hell_campaign_map.yaml"
Localization = "localization/hell_campaign_en.json"

# Circle Configuration (0-10 + Secret 11)
CircleCount = 11
HasSecretCircle = true

# NGD Routing per Circle - using array of strings indexed by circle
CircleNGDRoutes = [
    "HYBRID_OK",      # 0: Abyssal Gate
    "HYBRID_OK",      # 1: Limbo
    "HYBRID_OK",      # 2: Lust
    "LOCAL_REQUIRED", # 3: Gluttony
    "LOCAL_REQUIRED", # 4: Greed
    "LOCAL_REQUIRED", # 4: Wrath
    "LOCAL_CEREBELLUM", # 5: Heresy
    "LOCAL_CEREBELLUM", # 6: Violence
    "LOCAL_CEREBELLUM", # 7: Fraud
    "LOCAL_CEREBELLUM", # 8: Treachery
    "LOCAL_CEREBELLUM", # 9: Lucifer's Throne
    "LOCAL_CEREBELLUM"  # 10: Pandemonium (Secret)
]

# Lucifer Influence per Circle (0.0 - 1.0)
LuciferInfluence = [
    0.0,  # 0: Abyssal Gate
    0.1,  # 1: Limbo
    0.2,  # 2: Lust
    0.3,  # 3: Gluttony
    0.4,  # 4: Greed
    0.5,  # 5: Wrath
    0.6,  # 6: Heresy
    0.7,  # 7: Violence
    0.8,  # 8: Fraud
    0.9,  # 9: Treachery
    1.0,  # 10: Lucifer's Throne
    1.0   # 11: Pandemonium (Secret)
]

# Lucifer Dialogue Triggers
LuciferDialogueTriggers.Circle5_Wrath = "lucifer_circle5_wrath"
