version: "3.8"

x-backend-env: &backend-env
  ENVIRONMENT: development
  API_KEY: polsia-unlocked-key
  SANDBOX_MODE: "false"
  DATABASE_URL: postgresql+asyncpg://polsia:polsia_password@postgres:5432/polsia
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  CHROMA_PERSIST_DIR: /app/data/chroma
  MORNING_CYCLE_HOUR: "6"
  EVENING_CYCLE_HOUR: "20"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polsia
      POSTGRES_PASSWORD: polsia_password
      POSTGRES_DB: polsia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polsia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
      - chroma_data:/app/data/chroma
      - ~/.claude:/root/.claude:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
      - chroma_data:/app/data/chroma
      - ~/.claude:/root/.claude:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app.worker worker --concurrency=4 --loglevel=info

  celery_beat:
    build: ./backend
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
      - chroma_data:/app/data/chroma
      - ~/.claude:/root/.claude:ro
      - celery_beat_data:/app/celerybeat-schedule
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app.worker beat --loglevel=info --schedule=/app/celerybeat-schedule

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  celery_beat_data:
